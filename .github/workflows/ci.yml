name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Shell syntax (bash -n)
        run: |
          for f in install.sh uninstall.sh hooks/*.sh; do
            echo "checking $f"
            bash -n "$f"
          done
      - name: ShellCheck
        run: shellcheck -S warning install.sh uninstall.sh hooks/*.sh
